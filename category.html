<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Market — Категория</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

<header class="topbar">
  <div class="container topbar__inner topbar__playerok">
    <a class="brand" href="index.html">
      <span class="brand__dot"></span>
      <span class="brand__name">Market</span>
    </a>

    <div class="topSearch">
      <input id="searchInput" placeholder="Поиск в категории..." />
      <button class="topSearch__clear" id="clearBtn" type="button" title="Очистить">✕</button>
    </div>

    <div class="topbar__actions">
      <button class="iconBtn" id="cartBtn" type="button" title="Корзина">
        🛒 <span class="badge" id="cartBadge" hidden>0</span>
      </button>
      <button class="iconBtn" id="profileBtn" type="button" title="Профиль">
        👤 <span>Войти</span>
      </button>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero hero--cat">
    <div>
      <div class="hero__title" id="catTitle">Категория</div>
      <div class="hero__sub" id="catSub">—</div>
      <div class="metaText" id="resultMeta">Товаров: —</div>
    </div>

    <div class="chips" id="categoryChips"></div>
  </section>

  <section class="grid" id="productsGrid"></section>

  <section class="empty" id="emptyState" hidden>
    <div class="empty__title">Ничего не найдено</div>
    <div class="empty__sub">Попробуй другой запрос</div>
    <button class="btn btn--primary" id="resetBtn" type="button">Сбросить</button>
  </section>
</main>

<script src="js/api.js"></script>
<script src="js/favorites.js"></script>
<script src="js/category.js"></script>
  <script src="js/notifications-ui.js"></script>
</body>
</html>
